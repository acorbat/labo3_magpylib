[workspace]
authors = ["Agustin Corbat <acorbat@df.uba.ar>"]
channels = ["conda-forge"]
name = "labo3_magpylib"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
chequear = "python scripts/chequear_materiales.py"
lab = { cmd = "jupyter lab notebooks/01_introduccion_magpylib.ipynb", depends-on = ["chequear"] }
notebook = { cmd = "jupyter notebook notebooks/01_introduccion_magpylib.ipynb", depends-on = ["chequear"] }
render-slides = { cmd = "quarto render slides/clase_magpylib.qmd", depends-on = ["chequear"] }

[dependencies]
python = "3.11.*"
numpy = ">=2.4.5,<3"
matplotlib = ">=3.10.9,<4"
jupyterlab = ">=4.5.7,<5"
ipykernel = ">=7.2.0,<8"
nbformat = ">=5.10.4,<6"
magpylib = ">=5.2.3,<6"
scipy = ">=1.17.1,<2"
pandas = ">=3.0.3,<4"
ipywidgets = ">=8.1.8,<9"
quarto = ">=1.9.37,<2"
